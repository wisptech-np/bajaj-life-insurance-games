<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="icon" href="data:;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==">
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Tightrope Protection - Bajaj Life Insurance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #04122B;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      color: #fff;
    }

    #root,
    .game-wrap {
      width: 100%;
      height: var(--app-height, 100vh);
      min-height: var(--app-height, 100vh);
    }

    #root {
      display: flex;
      justify-content: center;
    }

    .game-wrap {
      max-width: 480px;
      overflow: hidden;
      position: relative;
      background: #04122B;
    }

    .screen-scroll {
      width: 100%;
      height: 100%;
      min-height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    input,
    select {
      -webkit-appearance: none;
      appearance: none;
    }

    ::-webkit-scrollbar {
      width: 3px;
    }

    ::-webkit-scrollbar-thumb {
      background: #00AEEF;
      border-radius: 2px;
    }

    .btn-press:active {
      transform: scale(0.95);
    }

    @keyframes pop {
      0% {
        transform: scale(0.7);
        opacity: 0
      }

      100% {
        transform: scale(1);
        opacity: 1
      }
    }

    .pop {
      animation: pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0)
      }
      50% {
        transform: translateY(-8px)
      }
    }

    .float {
      animation: float 3s ease-in-out infinite;
    }

    @keyframes pulse-ring {
      0% {
        transform: scale(0.6);
        opacity: 0;
      }
      50% {
        opacity: 0.5;
      }
      100% {
        transform: scale(1.6);
        opacity: 0;
      }
    }

    .pulse-ripple {
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 3px solid #00AEEF;
      animation: pulse-ring 1.8s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
    }

    @keyframes swipe-loop {
      0% {
        transform: translateY(40px) scale(1);
        opacity: 0;
      }
      10% {
        transform: translateY(40px) scale(0.8);
        opacity: 1;
      }
      40% {
        transform: translateY(-40px) scale(0.8);
        opacity: 1;
      }
      50% {
        transform: translateY(-40px) scale(1);
        opacity: 0;
      }
      100% {
        transform: translateY(40px) scale(1);
        opacity: 0;
      }
    }

    .swipe-hand {
      animation: swipe-loop 2.4s ease-in-out infinite;
    }
  </style>
  <script>
    (() => {
      const syncAppHeight = () => {
        const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        document.documentElement.style.setProperty('--app-height', `${h}px`);
      };
      syncAppHeight();
      window.addEventListener('resize', syncAppHeight);
      window.addEventListener('orientationchange', syncAppHeight);
      if (window.visualViewport) window.visualViewport.addEventListener('resize', syncAppHeight);
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
